<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunaris</title>
    <style>
        :root {
            --bg: #0B1026;
            --text: #e8e8ff;
            --accent: #7B5CFF;
            --accent2: #4DEBFF;
            --card: rgba(15, 18, 40, 0.9);
            --glass: rgba(11, 16, 38, 0.85);
            --border: rgba(123, 92, 255, 0.15);
            --glow: 0 0 30px rgba(123, 92, 255, 0.6);
            --radius: 18px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.5s;
        }
        #bgCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-2; }

        /* GLASS PANELS */
        .navbar, .search-bar-wrap, .tab-bar, .game-card, .side-panel, .leaderboard, .login-panel {
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        /* NAV */
        .navbar {
            width:95%; max-width:1400px; margin:12px auto 0;
            padding:14px 24px; display:flex; align-items:center; gap:15px; flex-wrap:wrap;
        }
        .logo-wrap {
            display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none;
        }
        .logo-moon {
            font-size:2.4rem; animation:pulse 3s infinite;
        }
        @keyframes pulse {
            0%,100% { filter:drop-shadow(0 0 8px #7B5CFF); }
            50% { filter:drop-shadow(0 0 22px #4DEBFF); }
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif; font-size:1.8rem;
            color:#fff; letter-spacing:3px; text-shadow:0 0 20px var(--accent);
        }

        /* SEARCH */
        .search-bar-wrap {
            flex:1; min-width:280px; display:flex; align-items:center; gap:8px;
            padding:6px 14px; border-radius:30px;
        }
        .search-bar-wrap input {
            flex:1; background:transparent; border:none; color:white; font-size:1rem;
            outline:none; padding:10px 8px;
        }
        .search-bar-wrap button {
            background: var(--accent); border:none; color:white; padding:8px 16px;
            border-radius:20px; cursor:pointer; font-weight:600; transition:0.3s;
        }
        .search-bar-wrap button:hover { background: var(--accent2); color:#000; }

        /* TABS */
        .tab-bar {
            width:95%; max-width:1400px; margin:8px auto; padding:8px 20px;
            display:flex; gap:20px; justify-content:center;
        }
        .tab { padding:8px 20px; border-radius:20px; cursor:pointer; font-weight:600;
            transition:0.3s; border:1px solid transparent; }
        .tab.active { background:var(--accent); border-color:white; box-shadow:0 0 15px var(--accent); }

        /* HERO */
        .hero { text-align:center; padding:20px; }
        .hero h1 { font-family:'Orbitron'; font-size:2.6rem; color:var(--accent2); text-shadow:0 0 30px var(--accent2); }
        .action-buttons { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:12px 0; }
        .btn {
            background:linear-gradient(135deg, var(--accent), #4a30cc); border:none;
            padding:10px 20px; border-radius:25px; color:white; font-weight:600;
            cursor:pointer; transition:0.3s; box-shadow:var(--glow);
        }
        .btn:hover { transform:translateY(-3px); box-shadow:0 0 30px var(--accent2); }

        /* GAME GRID */
        .games-grid {
            width:95%; max-width:1400px; display:grid;
            grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
            gap:18px; padding:15px 10px 50px; margin:0 auto;
        }
        .game-card {
            border-radius:20px; overflow:hidden; transition:0.35s; cursor:pointer;
        }
        .game-card:hover { transform:translateY(-7px); box-shadow:0 15px 35px rgba(123,92,255,0.5); }
        .game-img {
            width:100%; height:130px; display:flex; align-items:center; justify-content:center;
            font-size:3rem; background:linear-gradient(135deg, #1a1040, #0d1a30);
        }
        .game-info { padding:14px; }
        .game-title { font-weight:600; font-size:1rem; margin-bottom:8px; }
        .game-actions { display:flex; justify-content:space-between; align-items:center; gap:6px; }
        .play-btn {
            background:var(--accent); padding:6px 14px; border-radius:15px; color:white;
            text-decoration:none; font-weight:600; font-size:0.8rem; border:none; cursor:pointer;
        }
        .play-btn:hover { background:var(--accent2); color:#000; }
        .fav-btn {
            background:transparent; border:1px solid rgba(255,255,255,0.3); color:white;
            border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:0.8rem;
        }
        .fav-btn.active { background:var(--accent); border-color:var(--accent); }

        /* SIDE PANELS */
        .side-panel {
            position:fixed; right:14px; bottom:14px; width:210px; padding:14px; z-index:90;
            text-align:center;
        }
        .clock { font-family:'Orbitron'; font-size:1.5rem; margin-bottom:8px; }
        .xp-bar-bg { height:7px; background:#333; border-radius:10px; margin:6px 0; }
        .xp-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); border-radius:10px; transition:0.4s; }
        .leaderboard {
            position:fixed; left:14px; bottom:14px; width:190px; padding:12px; z-index:90;
            font-size:0.78rem;
        }
        .leaderboard h4 { color:#ffcc00; margin-bottom:6px; }

        /* LOGIN */
        .login-panel {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            padding:30px; z-index:999; text-align:center; display:none;
            max-width:380px; width:90%;
        }
        .login-panel input {
            width:100%; padding:12px; margin:8px 0; border-radius:12px; border:1px solid var(--border);
            background:rgba(255,255,255,0.05); color:white; outline:none;
        }
        .login-panel input:focus { border-color:var(--accent2); }

        /* THEME PREVIEW */
        .theme-preview {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            padding:25px; z-index:998; display:none; text-align:center;
            max-width:420px; width:90%; border-radius:24px;
        }
        .theme-dot {
            display:inline-block; width:40px; height:40px; border-radius:50%; margin:6px;
            cursor:pointer; border:3px solid transparent; transition:0.3s;
        }
        .theme-dot:hover { border-color:white; transform:scale(1.2); }
        .theme-dot.selected { border-color:var(--accent2); box-shadow:0 0 20px var(--accent2); }

        /* IFRAME */
        #gameFrame {
            position:fixed; top:0; left:0; width:100%; height:100%; z-index:500;
            border:none; display:none; background:#000;
        }
        #closeFrame {
            position:fixed; top:12px; right:16px; z-index:510; background:red; color:white;
            border:none; padding:8px 16px; border-radius:14px; cursor:pointer; display:none;
            font-weight:700;
        }

        @media(max-width:700px) {
            .hero h1 { font-size:1.8rem; }
            .side-panel, .leaderboard { position:static; width:90%; margin:10px auto; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <!-- CLOSE GAME -->
    <button id="closeFrame" onclick="closeGame()">✕ Close Game</button>
    <iframe id="gameFrame" allow="cross-origin-isolated"></iframe>

    <!-- LOGIN -->
    <div class="login-panel" id="loginPanel">
        <h2 style="color:var(--accent2);">🌙 Welcome to Lunaris</h2>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn" onclick="doLogin()" style="width:100%; margin-top:8px;">Enter</button>
        <p style="font-size:0.7rem; color:#888; margin-top:8px;">Your data saves locally.</p>
    </div>

    <!-- THEME PREVIEW -->
    <div class="theme-preview" id="themePanel">
        <h3 style="color:var(--accent2); margin-bottom:12px;">🎨 Choose Theme</h3>
        <div id="themeDots"></div>
        <button class="btn" onclick="document.getElementById('themePanel').style.display='none'" style="margin-top:12px;">Close</button>
    </div>

    <!-- NAV -->
    <div class="navbar">
        <div class="logo-wrap" id="logoEgg">
            <span class="logo-moon">🌙</span>
            <span class="logo-text">LUNARIS</span>
        </div>
        <div class="search-bar-wrap">
            <input type="text" id="searchInput" placeholder="search with ease..." autocomplete="off">
            <button onclick="searchDDG()">🔍</button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tab-bar">
        <span class="tab active" data-tab="games">🎮 Games</span>
        <span class="tab" data-tab="apps">⚡ Quick Apps</span>
        <span class="tab" data-tab="media">📺 Media</span>
    </div>

    <!-- HERO -->
    <div class="hero">
        <h1>LUNARIS</h1>
        <p style="opacity:0.7;">search through <span id="gameCount">0</span> games...</p>
        <div class="action-buttons">
            <button class="btn" onclick="randomGame()">🎲 Random</button>
            <button class="btn" onclick="dailyPick()">⭐ Daily</button>
            <button class="btn" onclick="document.getElementById('themePanel').style.display='block'; renderThemeDots();">🎨 Theme</button>
            <button class="btn" onclick="toggleFullscreen()">⛶ FS</button>
            <button class="btn" onclick="document.getElementById('loginPanel').style.display='flex'">💾 Login</button>
        </div>
    </div>

    <!-- GAME GRID -->
    <div class="games-grid" id="gamesContainer"></div>

    <!-- SIDE -->
    <div class="side-panel">
        <div class="clock" id="clock">00:00</div>
        <div>🎮 Lv.<span id="xpLevel">1</span></div>
        <div class="xp-bar-bg"><div class="xp-fill" id="xpFill"></div></div>
        <span id="xpText" style="font-size:0.65rem;">0/100 XP</span>
    </div>
    <div class="leaderboard">
        <h4>🏆 LUNARIS</h4>
        <div>⭐ <span id="lb1">ShadowX</span></div>
        <div>⭐ <span id="lb2">NeonKun</span></div>
        <div style="color:var(--accent2);">🌙 <span id="lbYou">You</span></div>
    </div>

    <script>
        // ===== DATA =====
        const GAME_BASE = "https://task.babypos.hk/news/frame.html?mbed=/assets/src/";
        const games = [
            { name:"1 on 1 Soccer", slug:"1-on-1-soccer", icon:"⚽", cat:"sports" },
            { name:"Slope", slug:"slope", icon:"🏂", cat:"action" },
            { name:"Basket Random", slug:"basket-random", icon:"🏀", cat:"sports" },
            { name:"A Dance of Fire and Ice", slug:"adofai", icon:"🔥", cat:"action" },
            { name:"Minecraft", slug:"mc/152", icon:"⛏️", cat:"action" },
            { name:"Supreme Duelist", slug:"supreme-duelist", icon:"⚔️", cat:"action" },
            { name:"Ironsnout", slug:"ironsnout", icon:"🐗", cat:"action" },
            { name:"Pizza Tower Scoutdigo", slug:"pizza-tower/scoutdigo", icon:"🍕", cat:"action" },
            { name:"Apes vs Helium", slug:"apes", icon:"🦍", cat:"action" },
            { name:"Bank Robbery", slug:"bank-robbery", icon:"💰", cat:"action" },
            { name:"Bitlife", slug:"bitlife", icon:"🧬", cat:"action" },
            { name:"Baby Sniper Vietnam", slug:"babysnipervietnam", icon:"🔫", cat:"action" },
            { name:"Bad Time Simulator", slug:"bad-time-simulator", icon:"💀", cat:"action" },
            { name:"Baldi Basics", slug:"baldi-basics", icon:"📏", cat:"scary" },
            { name:"Run 3", slug:"run-3", icon:"🏃", cat:"action" },
            { name:"Subway Surfers", slug:"subway-surfers", icon:"🏄", cat:"action" },
            { name:"Temple Run 2", slug:"temple-run-2", icon:"🏛️", cat:"action" },
            { name:"Geometry Dash", slug:"geometry-dash", icon:"🔺", cat:"action" },
            { name:"Happy Wheels", slug:"happy-wheels", icon:"🛴", cat:"action" },
            { name:"Paper.io", slug:"paper-io", icon:"📄", cat:"io" },
            { name:"Hole.io", slug:"hole-io", icon:"🕳️", cat:"io" },
            { name:"Agar.io", slug:"agar-io", icon:"🔵", cat:"io" },
            { name:"Slither.io", slug:"slither-io", icon:"🐍", cat:"io" },
            { name:"Smash Karts", slug:"smash-karts", icon:"🏎️", cat:"io" },
            { name:"Chess", slug:"chess", icon:"♟️", cat:"puzzle" },
            { name:"2048", slug:"2048", icon:"🔢", cat:"puzzle" },
            { name:"Wordle", slug:"wordle", icon:"🟩", cat:"puzzle" },
            { name:"Flappy Bird", slug:"flappy-bird", icon:"🐦", cat:"retro" },
            { name:"Pac-Man", slug:"pac-man", icon:"🟡", cat:"retro" },
            { name:"Tetris", slug:"tetris", icon:"🧱", cat:"retro" },
        ];

        let xp = parseInt(localStorage.getItem('lunaris_xp')||'0');
        let favs = JSON.parse(localStorage.getItem('lunaris_favs')||'[]');
        let recent = JSON.parse(localStorage.getItem('lunaris_recent')||'[]');
        let username = localStorage.getItem('lunaris_user')||'';
        let currentCat = 'all';

        // ===== RENDER =====
        function renderGames() {
            const term = (document.getElementById('searchInput').value||'').toLowerCase();
            let filtered = currentCat==='all'? games : games.filter(g=>g.cat===currentCat);
            filtered = filtered.filter(g=>g.name.toLowerCase().includes(term));
            document.getElementById('gameCount').textContent = filtered.length;
            document.getElementById('gamesContainer').innerHTML = filtered.map(g=>{
                const fav = favs.includes(g.slug);
                return `
                <div class="game-card">
                    <div class="game-img">${g.icon||'🎮'}</div>
                    <div class="game-info">
                        <div class="game-title">${g.name}</div>
                        <div class="game-actions">
                            <button class="play-btn" onclick="playGame('${g.slug}')">▶ Play</button>
                            <button class="fav-btn ${fav?'active':''}" onclick="toggleFav(event,'${g.slug}')">❤️</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function playGame(slug) {
            const url = GAME_BASE + slug + '/index.html';
            recent = [slug, ...recent.filter(s=>s!==slug)].slice(0,10);
            localStorage.setItem('lunaris_recent', JSON.stringify(recent));
            addXP(5);
            document.getElementById('gameFrame').src = url;
            document.getElementById('gameFrame').style.display = 'block';
            document.getElementById('closeFrame').style.display = 'block';
        }
        function closeGame() {
            document.getElementById('gameFrame').style.display = 'none';
            document.getElementById('closeFrame').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }
        function toggleFav(e, slug) {
            e.stopPropagation();
            if(favs.includes(slug)) favs = favs.filter(f=>f!==slug);
            else favs.push(slug);
            localStorage.setItem('lunaris_favs', JSON.stringify(favs));
            renderGames();
        }

        // ===== XP =====
        function addXP(n=10){ xp+=n; updateXP(); }
        function updateXP(){
            const lv = Math.floor(xp/100)+1;
            document.getElementById('xpFill').style.width = ((xp%100)/100*100)+'%';
            document.getElementById('xpLevel').textContent = lv;
            document.getElementById('xpText').textContent = (xp%100)+'/100 XP';
            document.getElementById('lbYou').textContent = username||'You';
            localStorage.setItem('lunaris_xp', xp);
        }

        // ===== LOGIN =====
        function doLogin(){
            const u = document.getElementById('loginUser').value.trim();
            if(u){
                username = u;
                localStorage.setItem('lunaris_user', u);
                document.getElementById('loginPanel').style.display='none';
                updateXP();
            }
        }
        if(username) updateXP(); else document.getElementById('loginPanel').style.display='flex';

        // ===== SEARCH (DuckDuckGo via unblocker) =====
        function searchDDG(){
            const q = document.getElementById('searchInput').value.trim();
            if(q){
                const ddg = 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
                document.getElementById('gameFrame').src = ddg;
                document.getElementById('gameFrame').style.display = 'block';
                document.getElementById('closeFrame').style.display = 'block';
            }
        }
        document.getElementById('searchInput').addEventListener('keydown', (e)=>{
            if(e.key==='Enter') searchDDG();
        });

        // ===== RANDOM / DAILY =====
        function randomGame(){ playGame(games[Math.floor(Math.random()*games.length)].slug); }
        function dailyPick(){
            const d = new Date().toDateString(); let h=0;
            for(let i=0;i<d.length;i++) h=((h<<5)-h)+d.charCodeAt(i);
            playGame(games[Math.abs(h)%games.length].slug);
        }

        // ===== THEMES =====
        const themes = [
            {name:'Default', bg:'#0B1026', acc:'#7B5CFF', acc2:'#4DEBFF'},
            {name:'Forest', bg:'#0a1f0a', acc:'#33cc33', acc2:'#99ff99'},
            {name:'Crimson', bg:'#1f0a0a', acc:'#ff3333', acc2:'#ff9999'},
            {name:'Midnight', bg:'#0a0a1f', acc:'#6666ff', acc2:'#aaaaff'},
            {name:'Sunset', bg:'#1f1a0a', acc:'#ff8800', acc2:'#ffcc66'},
            {name:'Ocean', bg:'#0a1a2e', acc:'#00aaff', acc2:'#66ddff'},
            {name:'Lavender', bg:'#1a0a2e', acc:'#aa66ff', acc2:'#ddaaff'},
            {name:'Monochrome', bg:'#111111', acc:'#ffffff', acc2:'#cccccc'},
        ];
        function renderThemeDots(){
            document.getElementById('themeDots').innerHTML = themes.map((t,i)=>`
                <span class="theme-dot" style="background:${t.acc};" onclick="setTheme(${i})" title="${t.name}"></span>
            `).join('');
        }
        function setTheme(i){
            const t = themes[i];
            document.documentElement.style.setProperty('--bg', t.bg);
            document.documentElement.style.setProperty('--accent', t.acc);
            document.documentElement.style.setProperty('--accent2', t.acc2);
            document.body.style.background = t.bg;
            localStorage.setItem('lunaris_theme', i);
            document.getElementById('themePanel').style.display='none';
        }
        const savedTheme = localStorage.getItem('lunaris_theme');
        if(savedTheme!==null) setTheme(parseInt(savedTheme));

        // ===== FULLSCREEN =====
        function toggleFullscreen(){
            document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
        }

        // ===== TABS =====
        document.querySelectorAll('.tab').forEach(tab=>{
            tab.addEventListener('click', ()=>{
                document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                if(tab.dataset.tab==='games') renderGames();
            });
        });

        // ===== CLOCK =====
        setInterval(()=>{ document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);

        // ===== EASTER EGG =====
        let clicks=0;
        document.getElementById('logoEgg').addEventListener('click', ()=>{
            clicks++; if(clicks>=5){
                document.body.innerHTML='<div style="color:#0f0;height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:2rem;flex-direction:column;">🌙 Lunaris Admin<br>> Access Granted.</div>';
                setTimeout(()=>location.reload(),2500);
            }
            setTimeout(()=>clicks=0,2000);
        });

        // ===== CANVAS =====
        const canvas=document.getElementById('bgCanvas'), ctx=canvas.getContext('2d');
        let w,h;
        function resize(){ w=innerWidth; h=innerHeight; canvas.width=w; canvas.height=h; }
        window.addEventListener('resize',resize); resize();
        function draw(){
            ctx.clearRect(0,0,w,h);
            for(let i=0;i<50;i++){
                const x=(Math.sin(i*7+Date.now()/9000)*0.5+0.5)*w;
                const y=(Math.cos(i*9+Date.now()/7000)*0.5+0.5)*h;
                ctx.fillStyle='rgba(123,92,255,0.2)';
                ctx.beginPath(); ctx.arc(x,y,1.5+Math.sin(i)*1.2,0,Math.PI*2); ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        draw();

        // ===== INIT =====
        document.getElementById('searchInput').addEventListener('input', renderGames);
        renderGames();
    </script>
</body>
</html>
